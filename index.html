<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DraxBet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ===== GAME CARD BASE ===== */
.game-card{
  min-height:140px;
  border-radius:16px;
  padding:14px;
  cursor:pointer;
  transition:0.2s;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.game-card:active{transform:scale(0.97)}
.game-card h3{margin:6px 0 0;font-size:18px}
.game-card p{font-size:13px;opacity:0.85}
.icon{font-size:32px}

/* BODY */
body{margin:0;font-family:Arial;background:#ffeb3b;color:#fff}

/* HEADER */
.header{padding:15px;font-size:22px;font-weight:bold;text-align:center}

/* 🔥 BANNER SLIDER */
.banner-slider{
margin:0 15px 10px;
border-radius:16px;
overflow:hidden;
}
.banner-track{
display:flex;
transition:transform .4s ease;
}
.banner-track img{
width:100%;
height:180px;
object-fit:cover;
flex-shrink:0;
}

/* MENU */
.menu{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:15px}

/* BOTTOM NAV */
.bottom-nav{
position:fixed;bottom:0;left:0;right:0;
background:#111;display:flex;border-top:1px solid #222
}
.nav-btn{flex:1;padding:10px 0;text-align:center;font-size:12px;color:#aaa}
.nav-btn.active{color:#4caf50;font-weight:bold}
.nav-btn div{font-size:20px}
.spacer{height:70px}

/* SUPPORT ICON */
#supportIcon{
position: fixed;
right: 16px;
bottom: 90px;
width: 56px;
height: 56px;
background: #111;
color: #fff;
font-size: 26px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 6px 14px rgba(0,0,0,0.4);
cursor: pointer;
z-index: 9999;
}

/* 🎁 GIFT ICON */
#giftIcon{
position: fixed;
right: 16px;
bottom: 160px;
width: 56px;
height: 56px;
background: #ff3b3b;
color: #fff;
font-size: 26px;
border-radius: 50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 6px 14px rgba(0,0,0,0.4);
cursor:pointer;
z-index:9999;
}

/* POPUP */
.deposit-popup{
position:fixed;inset:0;background:rgba(0,0,0,.75);
display:none;align-items:center;justify-content:center;z-index:99999
}
.deposit-box{
width:85%;max-width:340px;
background:linear-gradient(135deg,#ff9800,#ff5722);
border-radius:18px;padding:22px;text-align:center
}
.deposit-box button{
margin-top:14px;width:100%;padding:12px;border:none;
border-radius:12px;background:#000;color:#fff;font-size:16px;font-weight:bold
}

/* 🎁 GIFT POPUP */
.gift-popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
display:none;
align-items:center;
justify-content:center;
z-index:99999
}

.gift-box{
width:85%;
max-width:320px;
background:#fff;
border-radius:16px;
padding:20px;
text-align:center;
color:#000;
}

.gift-box input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

.gift-box button{
margin-top:12px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ff3b3b;
color:#fff;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">🏦DraxBet🏦</div>

<!-- 🎁 GIFT ICON -->
<div id="giftIcon" onclick="openGiftBox()">🎁</div>

<!-- ✉️ SUPPORT ICON -->
<div id="supportIcon" onclick="openSupportMail()">✉️</div>

<!-- 🔥 SLIDER -->
<div class="banner-slider">
<div class="banner-track" id="bannerTrack">
<img src="images/file_000000001fa87208a7f51620e8c64b95.png">
<img src="images/file_00000000352c7208ae624a30d07574cd.png">
</div>
</div>

<!-- MENU -->
<div class="menu">

<div class="game-card wingo" onclick="openGame('wingo.html')"><div class="icon">🎨</div><h3>WIN GO</h3><p>30s Colour Trading</p></div>

<div class="game-card mines" onclick="openGame('mines.html')"><div class="icon">💣</div><h3>MINES</h3><p>Spribe Style Game</p></div>

<div class="game-card aviator" onclick="openGame('aviator.html')"><div class="icon">✈️</div><h3>AVIATOR</h3><p>Crash Multiplier</p></div>

</div>

<div class="spacer"></div>

<!-- 🎁 GIFT POPUP -->
<div class="gift-popup" id="giftPopup">
<div class="gift-box">

<h2>🎁 Redeem Gift Code</h2>

<input type="text" id="giftCodeInput" placeholder="Enter Gift Code">

<button onclick="redeemCode()">Redeem</button>

</div>
</div>

<!-- DEPOSIT POPUP -->
<div class="deposit-popup" id="depositPopup">
<div class="deposit-box">
<h2>Minimum Deposit ₹100</h2>
<p>Play karne ke liye pehle ₹100 deposit karo</p>
<button onclick="location.href='wallet.html'">Deposit Now</button>
</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
<div class="nav-btn active"><div>🏠</div>Home</div>
<div class="nav-btn" onclick="location.href='wallet.html'"><div>💰</div>Wallet</div>
<div class="nav-btn" onclick="location.href='promotion.html'"><div>🎁</div>Promotion</div>
<div class="nav-btn" onclick="location.href='account.html'"><div>👤</div>Account</div>
</div>

<script>

/* SUPPORT MAIL */
function openSupportMail(){
window.location.href="mailto:supirtx4@gmail.com?subject=DraxBet Support";
}

/* OPEN GAME */
function openGame(url){

let walletAmt =
+localStorage.getItem("wallet") ||
+localStorage.getItem("coin_wallet") ||
0;

if(walletAmt < 100){
document.getElementById("depositPopup").style.display="flex";
}else{
location.href = url;
}

}

/* 🎁 OPEN GIFT POPUP */
function openGiftBox(){
document.getElementById("giftPopup").style.display="flex";
}

/* 🎁 REDEEM SYSTEM (LOCAL DEMO) */
function redeemCode(){

const code=document.getElementById("giftCodeInput").value;

if(code==="FREE100"){
let wallet = +localStorage.getItem("wallet") || 0;
wallet += 100;
localStorage.setItem("wallet",wallet);
alert("₹100 Added to Wallet");
}else{
alert("Invalid Code");
}

}

/* SLIDER */
const track = document.getElementById("bannerTrack");
let index = 0;
const total = track.children.length;

setInterval(()=>{
index = (index + 1) % total;
track.style.transform = `translateX(-${index * 100}%)`;
},3000);

</script>

</body>
</html>
